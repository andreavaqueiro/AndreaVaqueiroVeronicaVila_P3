services:
  mongo:
    image: mongo:4.4
    container_name: eco-dimming-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - eco-dimming-net

  orion:
    image: fiware/orion-ld:1.5.1
    container_name: eco-dimming-orion
    depends_on:
      - mongo
    environment:
      ORIONLD_MONGO_HOST: mongo
    ports:
      - "1026:1026"
    networks:
      - eco-dimming-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: eco-dimming-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - eco-dimming-net

  iot-agent:
    image: fiware/iotagent-json:latest
    container_name: eco-dimming-iot-agent
    depends_on:
      - mongo
      - mosquitto
    environment:
      IOTA_REGISTRY_TYPE: mongodb
      IOTA_MONGO_HOST: mongo
      IOTA_MONGO_PORT: 27017
      IOTA_MONGO_DB: iotagentjson
      IOTA_MONGO_URI: mongodb://mongo:27017
      IOTA_CB_HOST: orion
      IOTA_CB_PORT: 1026
      IOTA_MQTT_HOST: mosquitto
      IOTA_MQTT_PORT: 1883
      IOTA_DEFAULT_RESOURCE: /iot
      IOTA_LOG_LEVEL: DEBUG
      IOTA_AUTOCAST: true
    ports:
      - "4041:4041"
    networks:
      - eco-dimming-net
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); const req=http.get('http://localhost:4041/iot/about', (res)=>process.exit(res.statusCode===200?0:1)); req.on('error',()=>process.exit(1)); req.setTimeout(1500, ()=>{req.destroy(); process.exit(1);});"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eco-dimming-backend
    depends_on:
      - orion
    environment:
      ORION_BASE_URL: http://orion:1026
      QUANTUMLEAP_BASE_URL: http://quantumleap:8668
    ports:
      - "8080:8080"
    networks:
      - eco-dimming-net

  crate:
    image: crate:4.6.7
    container_name: eco-dimming-crate
    command: ["crate", "-Ccluster.name=eco-dimming", "-Cnetwork.host=0.0.0.0", "-Chttp.cors.enabled=true", "-Chttp.cors.allow-origin=*"]
    ports:
      - "4200:4200"
      - "5432:5432"
    volumes:
      - crate-data:/data
    networks:
      - eco-dimming-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/"]
      interval: 10s
      timeout: 5s
      retries: 10

  quantumleap:
    image: orchestracities/quantumleap:1.0.0
    container_name: eco-dimming-quantumleap
    depends_on:
      - crate
    environment:
      CRATE_HOST: crate
      CRATE_PORT: 4200
      LOGLEVEL: INFO
    ports:
      - "8668:8668"
    networks:
      - eco-dimming-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8668/version"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: nginx:1.27-alpine
    container_name: eco-dimming-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
    networks:
      - eco-dimming-net

volumes:
  mongo-data:
  crate-data:

networks:
  eco-dimming-net:
    driver: bridge


